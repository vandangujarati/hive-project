<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HIVE Live Sessions</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow bg-glow-blue"></div>
  <div class="bg-glow bg-glow-purple"></div>
  <canvas id="particles"></canvas>

  <div class="app-layout">
    <!-- SIDEBAR (copied from dashboard.html) -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="logo">
          <span class="logo-text">HIVE</span>
        </div>
      </div>
      <div class="sidebar-nav">
        <!-- Add this inside .sidebar-nav, right after the INSIGHTS section -->
      <div class="sidebar-section">
        <div class="sidebar-section-label">SWITCH ROLE</div>
        <a href="admin.html" class="nav-item">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
          <span style="color: #4A9EFF;">Admin Portal</span>
        </a>
      </div>
        <div class="sidebar-section">
          <div class="sidebar-section-label">MAIN</div>
          <a href="dashboard.html" class="nav-item">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 12L12 3l9 9"></path>
              <path d="M5 10v10h4v-6h6v6h4V10"></path>
            </svg>
            <span>Overview</span>
          </a>
          <a href="sessions.html" class="nav-item active">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="5" width="20" height="14" rx="2"></rect>
              <polyline points="10,9 15,12 10,15"></polyline>
            </svg>
            <span>Live Sessions</span>
            <span class="nav-badge">5</span>
          </a>
          <a href="#" class="nav-item">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="8" r="4"></circle>
              <path d="M6 20a6 6 0 0112 0"></path>
            </svg>
            <span>My Skills</span>
          </a>
        </div>
        <div class="sidebar-section">
          <div class="sidebar-section-label">INSIGHTS</div>
          <a href="#" class="nav-item">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="20" x2="18" y2="10"></line>
              <line x1="12" y1="20" x2="12" y2="4"></line>
              <line x1="6" y1="20" x2="6" y2="14"></line>
            </svg>
            <span>Analytics</span>
          </a>
          <a href="#" class="nav-item">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="7" height="7"></rect>
              <rect x="14" y="3" width="7" height="7"></rect>
              <rect x="14" y="14" width="7" height="7"></rect>
              <rect x="3" y="14" width="7" height="7"></rect>
            </svg>
            <span>Skill Matching</span>
          </a>
        </div>
      </div>
      <div class="sidebar-footer">
        <div class="user-card">
          <div class="user-avatar">VG</div>
          <div class="user-info">
            <div class="user-name">Vandan Gujrati</div>
            <div class="user-role">Learner • Tutor</div>
          </div>
          <div class="seu-badge">320 SEU</div>
        </div>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">
      <header class="page-header">
        <div class="page-logo">
          <svg width="32" height="32" viewBox="0 0 36 36" fill="none">
            <circle cx="18" cy="18" r="17" stroke="url(#lg1)" stroke-width="1.5"/>
            <circle cx="14" cy="18" r="6" fill="url(#lg2)" opacity="0.9"/>
            <circle cx="22" cy="18" r="6" fill="url(#lg3)" opacity="0.9"/>
            <circle cx="18" cy="18" r="5" fill="url(#lg4)"/>
            <defs>
              <linearGradient id="lg1" x1="10%" y1="10%" x2="36%" y2="36%" gradientUnits="userSpaceOnUse">
                <stop stop-color="#4A9EFF" offset="0%"/>
                <stop stop-color="#7B6FFF" offset="100%"/>
              </linearGradient>
              <linearGradient id="lg2" x1="10%" y1="10%" x2="28%" y2="28%" gradientUnits="userSpaceOnUse">
                <stop stop-color="#2a4a8a" offset="0%"/>
                <stop stop-color="#1a2f5e" offset="100%"/>
              </linearGradient>
              <linearGradient id="lg3" x1="10%" y1="10%" x2="28%" y2="28%" gradientUnits="userSpaceOnUse">
                <stop stop-color="#3a2a7a" offset="0%"/>
                <stop stop-color="#251a55" offset="100%"/>
              </linearGradient>
              <linearGradient id="lg4" x1="10%" y1="10%" x2="36%" y2="36%" gradientUnits="userSpaceOnUse">
                <stop stop-color="#e0eeff" offset="0%"/>
                <stop stop-color="#c0d0ff" offset="100%"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <h1>Live Sessions</h1>
        <p>Upcoming and active skill exchange sessions</p>
      </header>

      <section class="cards-grid">
        <div class="card full-width">
          <div class="card-header">
  <h3>Live & Upcoming Sessions</h3>
  <div class="filter-tabs">
    <button class="tab-btn active" data-filter="all">All</button>
    <button class="tab-btn" data-filter="live">Live</button>
    <button class="tab-btn" data-filter="js">JavaScript</button>
    <button class="tab-btn" data-filter="ml">Machine Learning</button>
    <button class="tab-btn" data-filter="english">English</button>
  </div>
</div>

          <div id="sessions-container">
            <p>Loading sessions...</p>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
